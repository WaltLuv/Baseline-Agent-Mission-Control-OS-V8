# ─────────────────────────────────────────────────────────────────────
# Baseline Flight Deck — cross-platform desktop installer build
#
# Trigger: tag a release as `flight-deck-v*` (e.g. flight-deck-v0.1.0)
# Result:  unsigned macOS .dmg + Windows .msi + Linux .AppImage / .deb
#          attached to a GitHub Release with the same tag.
#
# Signing:
#   - macOS: APPLE_CERTIFICATE / APPLE_CERTIFICATE_PASSWORD secrets enable
#     codesigning + notarization. Without them, the build still succeeds
#     but produces "unsigned development build" artifacts.
#   - Windows: WINDOWS_CERTIFICATE / WINDOWS_CERTIFICATE_PASSWORD enable
#     signtool. Without them, SmartScreen warns on first run.
#
# All builds are reproducible from the tag — no manual operator steps.
# ─────────────────────────────────────────────────────────────────────

name: Flight Deck — desktop release

on:
  push:
    tags:
      - 'flight-deck-v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag to build (e.g. v0.1.0)'
        required: true
        default: 'v0.1.0'

permissions:
  contents: write   # required to upload Release artifacts

env:
  CARGO_TERM_COLOR: always
  NODE_VERSION: '22'
  YARN_VERSION: '1.22.22'

jobs:
  # ─── Stage 1: build a matrix of desktop installers ─────────────────
  build:
    name: Build ${{ matrix.os-label }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14            # Apple Silicon runner
            os-label: macOS-arm64
            rust-target: aarch64-apple-darwin
            artifact-glob: |
              desktop/src-tauri/target/release/bundle/dmg/*.dmg
              desktop/src-tauri/target/release/bundle/macos/*.app.tar.gz
          - os: macos-13            # Intel runner for x86_64
            os-label: macOS-x64
            rust-target: x86_64-apple-darwin
            artifact-glob: |
              desktop/src-tauri/target/release/bundle/dmg/*.dmg
              desktop/src-tauri/target/release/bundle/macos/*.app.tar.gz
          - os: windows-latest
            os-label: Windows-x64
            rust-target: x86_64-pc-windows-msvc
            artifact-glob: |
              desktop/src-tauri/target/release/bundle/msi/*.msi
              desktop/src-tauri/target/release/bundle/nsis/*.exe
          - os: ubuntu-22.04
            os-label: Linux-x64
            rust-target: x86_64-unknown-linux-gnu
            artifact-glob: |
              desktop/src-tauri/target/release/bundle/appimage/*.AppImage
              desktop/src-tauri/target/release/bundle/deb/*.deb
          - os: ubuntu-22.04-arm
            os-label: Linux-arm64
            rust-target: aarch64-unknown-linux-gnu
            artifact-glob: |
              desktop/src-tauri/target/release/bundle/appimage/*.AppImage
              desktop/src-tauri/target/release/bundle/deb/*.deb

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux build deps
        if: matrix.os == 'ubuntu-22.04' || matrix.os == 'ubuntu-22.04-arm'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libssl-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libsoup-3.0-dev \
            patchelf

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-target }}

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            desktop/src-tauri/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('desktop/src-tauri/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install Yarn
        run: npm install -g yarn@${{ env.YARN_VERSION }}

      - name: Install Flight Deck deps
        working-directory: desktop
        run: yarn install --frozen-lockfile

      - name: Resolve version
        id: ver
        shell: bash
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/flight-deck-v* ]]; then
            echo "version=${GITHUB_REF#refs/tags/flight-deck-}" >> "$GITHUB_OUTPUT"
          else
            echo "version=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          fi

      # ── Build (unsigned by default — operator can flip to signed via secrets)
      - name: Build Flight Deck (Tauri)
        working-directory: desktop
        env:
          # Apple signing (optional). If unset, build is unsigned.
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          # Windows signing (optional)
          WINDOWS_CERTIFICATE: ${{ secrets.WINDOWS_CERTIFICATE }}
          WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
        run: yarn tauri build --target ${{ matrix.rust-target }}

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: flight-deck-${{ matrix.os-label }}-${{ steps.ver.outputs.version }}
          path: ${{ matrix.artifact-glob }}
          if-no-files-found: error
          retention-days: 30

  # ─── Stage 2: assemble GitHub Release (only on tag push) ───────────
  release:
    name: Publish GitHub Release
    if: startsWith(github.ref, 'refs/tags/flight-deck-v')
    needs: build
    runs-on: ubuntu-22.04
    steps:
      - name: Download all installer artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Inventory
        run: |
          echo "Built artifacts:"
          find dist -type f | sort

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Baseline Flight Deck ${{ github.ref_name }}
          generate_release_notes: true
          draft: false
          prerelease: false
          fail_on_unmatched_files: true
          body: |
            # Baseline Flight Deck ${{ github.ref_name }}

            **Status:** Unsigned development build.

            macOS users will see Gatekeeper warning ("unidentified developer").
            Windows users will see SmartScreen warning ("Unknown publisher").
            Both are dismissible — right-click → Open on macOS; "More info" → "Run anyway" on Windows.

            Linux users: `.AppImage` and `.deb` are unsigned. Set `chmod +x` on the AppImage to run it.

            To get a signed build, configure these GitHub Secrets and re-tag:
            - `APPLE_CERTIFICATE`, `APPLE_CERTIFICATE_PASSWORD`, `APPLE_SIGNING_IDENTITY`,
              `APPLE_ID`, `APPLE_PASSWORD`, `APPLE_TEAM_ID`
            - `WINDOWS_CERTIFICATE`, `WINDOWS_CERTIFICATE_PASSWORD`

            See `/flight-deck` on the running Mission Control deployment for full install + connect instructions.
          files: dist/**/*
