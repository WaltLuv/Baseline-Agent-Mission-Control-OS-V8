# ═══════════════════════════════════════════════════════════════════════
# Mission Control — DigitalOcean Droplet Compose
#
# Self-contained production stack for a single DO Droplet:
#   - mission-control (Next.js, hardened image)  →  data on a PERSISTENT bind mount
#   - caddy            (reverse proxy, automatic HTTPS via Let's Encrypt)
#
# The SQLite database lives at $MC_DATA_DIR on the host. Point that at a
# DigitalOcean Block Storage volume (auto-mounted at /mnt/<volume-name>) so the
# data survives container redeploys AND droplet rebuilds, and is snapshottable.
#
# Usage (on the droplet):
#   export MC_DATA_DIR=/mnt/mc_data         # path on the attached block volume
#   docker compose -f docker-compose.droplet.yml --env-file .env.production up -d --build
#
# Secrets come from .env.production (never inline, never committed).
# ═══════════════════════════════════════════════════════════════════════

services:
  mission-control:
    build:
      context: .
      dockerfile: Dockerfile.hardened
      args:
        MC_VERSION: ${MC_VERSION:-latest}
    container_name: mission-control
    restart: unless-stopped
    image: mission-control:${MC_VERSION:-latest}

    mem_limit: 512m
    mem_reservation: 256m
    cpus: 1.0
    pids_limit: 256

    expose:
      - "3000"

    env_file:
      - path: ${ENV_FILE:-.env.production}
        required: true

    healthcheck:
      test: ["CMD", "node", "/app/healthcheck.js"]
      interval: 30s
      timeout: 5s
      start_period: 20s
      retries: 3

    # ── PERSISTENT DATA ──────────────────────────────────────────────
    # Host path (on the attached DO block volume) → container /app/.data.
    # MISSION_CONTROL_DATA_DIR=/app/.data (set in .env.production) makes the
    # SQLite DB resolve to /app/.data/mission-control.db inside this mount.
    volumes:
      - ${MC_DATA_DIR:?set MC_DATA_DIR to the host data path, e.g. /mnt/mc_data}:/app/.data

    networks:
      - mc-internal
      - mc-proxy

    # ── Hardening (the data bind mount + tmpfs remain writable) ──────
    read_only: true
    tmpfs:
      - /tmp
      - /app/.next/cache
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    security_opt:
      - no-new-privileges:true

  caddy:
    image: caddy:2-alpine
    container_name: mc-proxy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile.production:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    environment:
      - MC_HOST=${MC_HOST:-localhost}
    networks:
      - mc-proxy
      - mc-internal
    healthcheck:
      test: ["CMD", "caddy", "health"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3

volumes:
  caddy-data:
    driver: local
  caddy-config:
    driver: local

networks:
  mc-proxy:
    driver: bridge
  mc-internal:
    driver: bridge
    internal: true
